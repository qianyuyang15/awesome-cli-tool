- name: Configure Git
  run: |
    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

- name: Create empty commit
  run: |
    git commit --allow-empty -m "auto commit"

# 安全寄り
- name: Pull latest
  run: |
    git pull --rebase origin main

- name: Push
  run: |
    git push origin main

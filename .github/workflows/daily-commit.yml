name: Daily Commit

on:
  schedule:
    - cron: "0 0 * * *"  # 毎日0時（UTC）
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create empty commit
        run: |
          git commit --allow-empty -m "daily commit"

      - name: Push
        run: |
          git push

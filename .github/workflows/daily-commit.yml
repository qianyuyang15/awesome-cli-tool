- uses: actions/checkout@v4
  with:
    ref: main
    fetch-depth: 0

- name: Configure Git
  run: |
    git config user.name "github-actions"
    git config user.email "github-actions@github.com"

- name: Create empty commit
  run: |
    git commit --allow-empty -m "auto commit"

- name: Push
  run: |
    git push origin HEAD:main --force
